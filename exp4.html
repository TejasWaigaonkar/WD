<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="exp4.css">

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        h1 {
            color: darkblue;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
        }
    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="text-decoration: underline;">Student Information</h1>

    <h2>Course Details</h2>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>Year</th>
        </tr>

        <tr>
            <td>Tejas</td>

        </tr>

        <tr>
            <td>Rahul</td>

            <td>Third</td>
        </tr>

    </table>
</body>
</html>
