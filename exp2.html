Exp 2 - Design a web page that includes an image, hyperlink, and a nested table
<html>
<head>
    <title>Web Page Design</title>
</head>

<body>

    <h1>My Web Page</h1>

    <!-- Image -->
    <h2>Image</h2>
    <img src="https://via.placeholder.com/150" alt="Sample Image">

    <!-- Hyperlink -->
    <h2>Hyperlink</h2>
    <p>Visit <a href="https://www.google.com" target="_blank">Google</a></p>

    <!-- Table with Nested Table -->
    <h2>Nested Table</h2>
    <table border="1">
        <tr>
            <th>Main Table</th>
            <th>Nested Table</th>
        </tr>

        <tr>
            <td>Row 1 Data</td>

            <td>
                <table border="1">
                    <tr>
                        <th>Sub Data 1</th>
                        <th>Sub Data 2</th>
                    </tr>

                    <tr>
                        <td>A</td>
                        <td>B</td>
                    </tr>
                </table>
            </td>

        </tr>
    </table>

</body>
</html>
